<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>ANG HR NFC 打卡</title>
  <script src="./config.js"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#111827;--muted:#6b7280;--line:#e5e7eb;--main:#ff7a21;--ok:#059669;--err:#dc2626}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#fff7ed,#f6f7fb 48%,#eef2ff);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px}
    .wrap{width:100%;max-width:460px}
    .brand{display:flex;align-items:center;gap:12px;margin:0 0 14px 4px}
    .logo{width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#ff8a2a,#ff6d1d);color:white;font-weight:1000;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px rgba(255,122,33,.25)}
    h1{margin:0;font-size:24px}.sub{font-size:13px;color:var(--muted);margin-top:5px}
    .card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;box-shadow:0 22px 52px rgba(17,24,39,.12);padding:22px}
    .nfc{border:1px dashed #f59e0b;background:#fffbeb;border-radius:20px;padding:16px;text-align:center;margin-bottom:14px}
    .nfc .big{font-size:18px;font-weight:1000;margin-bottom:6px}.nfc .id{font-family:ui-monospace,Menlo,Consolas,monospace;word-break:break-all;color:#92400e;font-weight:900}
    .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
    button{border:0;border-radius:18px;padding:14px 8px;font-size:15px;font-weight:1000}
    .in{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}.out{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}.ot{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
    .primary{width:100%;margin-top:10px;background:linear-gradient(135deg,#ff8a2a,#ff6d1d);color:#fff}
    .ghost{width:100%;margin-top:10px;background:#fff;border:1px solid var(--line);color:#374151}
    .status{margin-top:14px;border:1px solid var(--line);border-radius:16px;background:#f9fafb;padding:12px;white-space:pre-wrap;font-size:13px;line-height:1.55}
    .status.ok{background:#ecfdf5;border-color:#a7f3d0;color:#065f46}.status.err{background:#fef2f2;border-color:#fecaca;color:#991b1b}
    label{display:block;font-size:12px;font-weight:900;color:#374151;margin:12px 0 6px}
    input{width:100%;height:44px;border:1px solid #d1d5db;border-radius:14px;padding:0 12px;font-size:14px}
    .hint{font-size:12px;color:#6b7280;line-height:1.6;margin-top:10px}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">
      <div class="logo">NFC</div>
      <div><h1>NFC 打卡</h1><div class="sub">靠近公司 NFC 卡片後自動讀取</div></div>
    </div>

    <section class="card">
      <div class="nfc">
        <div class="big" id="nfcTitle">等待 NFC...</div>
        <div class="id" id="nfcId">尚未讀取</div>
      </div>

      <label>公司代號</label>
      <input id="companyCode" placeholder="ang_99">

      <label>員編</label>
      <input id="empId" placeholder="例如 ANG0603">

      <div class="grid">
        <button class="in" type="button" onclick="clock('clock_in')">上班</button>
        <button class="out" type="button" onclick="clock('clock_out')">下班</button>
        <button class="ot" type="button" onclick="clock('overtime')">加班</button>
      </div>

      <button class="primary" type="button" onclick="clock('clock_in')">使用 NFC 上班打卡</button>
      <button class="ghost" type="button" onclick="goLogin()">回登入頁</button>

      <div class="hint">
        員工手機不必重新登入也可用 NFC 打卡；後端會用 company_code + 員編/token 或 device_id 判定身份，並檢查 NFC 卡片是否已在「NFC設定」啟用。
      </div>
      <div id="status" class="status">準備中...</div>
    </section>
  </main>

<script>
(function(){
  'use strict';
  const CFG = window.ANG_HR_CONFIG || {};
  const qs = new URLSearchParams(location.search);
  window.NFC_STATE = {
    companyCode: qs.get('company_code') || qs.get('company_id') || localStorage.getItem('ang_company_code') || CFG.defaultCompanyCode || 'ang_99',
    deviceId: getDeviceId(),
    empId: qs.get('id') || localStorage.getItem('ang_login_id') || '',
    token: qs.get('token') || localStorage.getItem('ang_login_token') || '',
    nfcId: qs.get('nfc_id') || localStorage.getItem('ang_last_nfc_id') || '',
    nfcText: qs.get('nfc_text') || localStorage.getItem('ang_last_nfc_text') || '',
    gas: qs.get('gas') || CFG.apiBaseUrl || CFG.gasApiUrl || ''
  };

  document.getElementById('companyCode').value = NFC_STATE.companyCode;
  document.getElementById('empId').value = NFC_STATE.empId;
  renderNfc();

  window.addEventListener('ANG_HR_NFC_SCAN', function(e){
    const d = e.detail || {};
    NFC_STATE.nfcId = d.id || d.nfc_id || '';
    NFC_STATE.nfcText = d.text || '';
    localStorage.setItem('ang_last_nfc_id', NFC_STATE.nfcId);
    localStorage.setItem('ang_last_nfc_text', NFC_STATE.nfcText);
    renderNfc();
    setStatus('已讀取 NFC：' + NFC_STATE.nfcId + '\n請選擇上班 / 下班 / 加班。');
  });

  if (NFC_STATE.nfcId) setStatus('已帶入 NFC：' + NFC_STATE.nfcId + '\n請選擇打卡動作。');
  else setStatus('請將手機靠近公司 NFC 卡片。');
})();

function getDeviceId(){
  try {
    if (window.ANGHRApp && ANGHRApp.getDeviceId) {
      const v = String(ANGHRApp.getDeviceId() || '').trim();
      if (v) { localStorage.setItem('ang_device_id', v); return v; }
    }
  } catch(e) {}
  const qs = new URLSearchParams(location.search);
  let v = qs.get('device_id') || localStorage.getItem('ang_device_id') || '';
  if (!v) {
    v = 'web-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    localStorage.setItem('ang_device_id', v);
  }
  return v;
}

function renderNfc(){
  document.getElementById('nfcTitle').textContent = window.NFC_STATE.nfcId ? '已讀取 NFC' : '等待 NFC...';
  document.getElementById('nfcId').textContent = window.NFC_STATE.nfcId || '尚未讀取';
}

function setStatus(msg, type){
  const el = document.getElementById('status');
  el.textContent = msg || '';
  el.className = 'status' + (type ? ' ' + type : '');
}

async function clock(clockAction){
  try {
    const s = window.NFC_STATE;
    s.companyCode = document.getElementById('companyCode').value.trim() || s.companyCode;
    s.empId = document.getElementById('empId').value.trim().toUpperCase() || s.empId;

    if (!s.companyCode) return setStatus('請輸入公司代號', 'err');
    if (!s.nfcId) return setStatus('尚未讀取 NFC 卡片', 'err');

    setStatus('NFC 打卡送出中...');

    const pos = await getPositionSoft();

    const payload = {
      action: 'nfcClock',
      company_code: s.companyCode,
      company_id: s.companyCode,
      id: s.empId,
      token: s.token,
      device_id: s.deviceId,
      nfc_id: s.nfcId,
      nfc_text: s.nfcText,
      clock_action: clockAction,
      latitude: pos ? pos.latitude : '',
      longitude: pos ? pos.longitude : '',
      source: 'android_nfc_app'
    };

    const res = await fetch(s.gas, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    });

    const data = JSON.parse(await res.text());
    if (!data.ok) throw new Error(data.message || 'NFC 打卡失敗');

    if (data.id) {
      localStorage.setItem('ang_login_id', data.id);
      document.getElementById('empId').value = data.id;
    }
    if (data.token) localStorage.setItem('ang_login_token', data.token);
    localStorage.setItem('ang_company_code', s.companyCode);

    setStatus(data.message || 'NFC 打卡成功', 'ok');
    try {
      if (window.ANGHRApp && ANGHRApp.notify) ANGHRApp.notify('ANG HR', data.message || 'NFC 打卡成功');
    } catch(e) {}
  } catch(err) {
    setStatus(err.message || String(err), 'err');
  }
}

function getPositionSoft(){
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => resolve({latitude: pos.coords.latitude, longitude: pos.coords.longitude}),
      () => resolve(null),
      {enableHighAccuracy: true, timeout: 4500, maximumAge: 30000}
    );
  });
}

function goLogin(){
  const s = window.NFC_STATE;
  location.href = './login.html?company_id=' + encodeURIComponent(s.companyCode) + '&device_id=' + encodeURIComponent(s.deviceId) + '&_ts=' + Date.now();
}
</script>
</body>
</html>

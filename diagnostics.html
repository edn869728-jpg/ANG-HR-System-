<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>ANG HR 資料來源檢查</title>
  <script src="./config.js"></script>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f5f7fb;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:14px}
    .wrap{max-width:860px;margin:0 auto}
    .card{background:#fff;border-radius:22px;padding:16px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h1{font-size:22px;margin:0 0 8px}
    .muted{color:#6b7280;font-size:13px;line-height:1.55;font-weight:800}
    .row{display:grid;grid-template-columns:160px 1fr;gap:8px;padding:8px 0;border-bottom:1px solid #eef2f7;font-size:14px}
    .k{font-weight:900;color:#475569}
    .v{word-break:break-all}
    .ok{color:#059669;font-weight:900}
    .bad{color:#dc2626;font-weight:900}
    button{width:100%;border:0;border-radius:18px;padding:14px;background:linear-gradient(135deg,#ff882f,#ff6d1d,#ffac73);color:#fff;font-weight:900;font-size:15px}
    pre{white-space:pre-wrap;word-break:break-word;background:#0f172a;color:#e5e7eb;border-radius:18px;padding:12px;font-size:12px;line-height:1.5}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ANG HR｜資料來源檢查</h1>
      <div class="muted">這頁會直接問目前 config.js 指向的 API，確認後端實際開啟哪一本 Google 試算表。</div>
    </div>

    <div class="card">
      <div class="row"><div class="k">預期試算表</div><div class="v">1qsyDiIj_0DdQx6tB0l_BXE5AYEiRrtSr9RqxdKaxato</div></div>
      <div class="row"><div class="k">目前 API</div><div class="v" id="apiUrl">讀取中</div></div>
      <div class="row"><div class="k">Worker</div><div class="v" id="workerUrl">讀取中</div></div>
      <button onclick="runCheck()">檢查實際資料來源</button>
    </div>

    <div class="card">
      <div id="summary" class="muted">尚未檢查</div>
      <pre id="raw">尚未檢查</pre>
    </div>
  </div>

  <script>
    const cfg = window.ANG_HR_CONFIG || {};
    const api = cfg.apiBaseUrl || cfg.workerApiUrl || cfg.gasApiUrl || '';
    document.getElementById('apiUrl').textContent = api || '未設定';
    document.getElementById('workerUrl').textContent = cfg.workerApiUrl || '已關閉';

    function show(obj){
      document.getElementById('raw').textContent = JSON.stringify(obj, null, 2);
      const ok = obj && obj.ok && obj.matchedOpenedSpreadsheet;
      document.getElementById('summary').innerHTML = ok
        ? '<span class="ok">正確：後端正在讀取指定試算表。</span>'
        : '<span class="bad">不一致：目前後端不是讀取指定試算表，或 GAS 尚未重新部署。</span>';
    }

    function runCheck(){
      if(!api){
        show({ok:false,message:'config.js 沒有 apiBaseUrl / gasApiUrl'});
        return;
      }
      document.getElementById('summary').textContent = '檢查中...';
      fetch(api, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify({action:'debugRuntimeInfo', _ts:Date.now()})
      })
      .then(r=>r.text())
      .then(t=>{
        let data={};
        try{data=JSON.parse(t)}catch(e){data={ok:false,message:'回傳不是 JSON',raw:t}}
        show(data);
      })
      .catch(e=>show({ok:false,message:String(e)}));
    }

    runCheck();
  </script>
</body>
</html>
